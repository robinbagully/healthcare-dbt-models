name: 'healthcare_rcm'
version: '1.0.0'
config-version: 2

profile: 'healthcare_rcm'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  healthcare_rcm:
    staging:
      +materialized: view
      +schema: staging

    intermediate:
      +materialized: ephemeral

    marts:
      +materialized: table
      revenue_cycle:
        +schema: mart_rcm
      clinical:
        +schema: mart_clinical

vars:
  ar_bucket_1: 30
  ar_bucket_2: 60
  ar_bucket_3: 90
  denial_lookback_days: 90
